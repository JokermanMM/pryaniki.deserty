<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <link rel="icon" type="image/png" href="static/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdf6ee 0%, #f5e6d3 40%, #faf0e4 100%);
            color: #3d2b1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: wobble 2s ease-in-out infinite;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(4rem, 12vw, 7rem);
            font-weight: 700;
            background: linear-gradient(135deg, #b8762e, #a05a2c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: rgba(61, 43, 31, 0.65);
            margin-bottom: 36px;
            max-width: 400px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(180, 140, 100, 0.2);
            border-radius: 50px;
            backdrop-filter: blur(16px);
            text-decoration: none;
            color: #3d2b1f;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(100, 60, 20, 0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .home-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(100, 60, 20, 0.15);
            border-color: #b8762e;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-12deg); }
            40% { transform: rotate(10deg); }
            60% { transform: rotate(-6deg); }
            80% { transform: rotate(4deg); }
        }
    </style>
</head>
<body>
    <div class="error-icon">🍪</div>
    <div class="error-code">404</div>
    <p class="error-message">Ой! Кажется, этот пряничек потерялся. Такой страницы не существует.</p>
    <a href="/" class="home-link">🏠 На главную</a>
</body>
</html>
